<section class="task-list">
  <div class="task-list__header">
    <h2 class="task-list__title">Tasks</h2>
    <div class="task-list__filters">
      <button
        class="filter-btn"
        [class.filter-btn--active]="activeFilter === 'all'"
        (click)="setFilter('all')"
      >
        All
      </button>
      <button
        class="filter-btn"
        [class.filter-btn--active]="activeFilter === 'pending'"
        (click)="setFilter('pending')"
      >
        Pending
      </button>
      <button
        class="filter-btn"
        [class.filter-btn--active]="activeFilter === 'completed'"
        (click)="setFilter('completed')"
      >
        Completed
      </button>
    </div>
  </div>

  <!-- Empty state -->
  <div class="empty-state" *ngIf="filteredTasks.length === 0">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
      <path d="M9 11l3 3L22 4" />
      <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11" />
    </svg>
    <p>No tasks found</p>
  </div>

  <!-- Task items -->
  <div class="task-items">
    <div
      class="task-item"
      *ngFor="let task of filteredTasks"
      [class.task-item--completed]="task.isCompleted"
    >
      <!-- Checkbox -->
      <button
        class="task-check"
        [class.task-check--done]="task.isCompleted"
        (click)="complete(task.id)"
        [disabled]="task.isCompleted"
      >
        <svg
          *ngIf="task.isCompleted"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
        >
          <polyline points="20 6 9 17 4 12" />
        </svg>
      </button>

      <!-- Content -->
      <div class="task-content">
        <h3 class="task-title">{{ task.title }}</h3>
        <p class="task-description">{{ task.description }}</p>
        <div class="task-meta">
          <span class="task-date" [class.task-date--overdue]="isOverdue(task)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="4" width="18" height="18" rx="2" />
              <line x1="16" y1="2" x2="16" y2="6" />
              <line x1="8" y1="2" x2="8" y2="6" />
              <line x1="3" y1="10" x2="21" y2="10" />
            </svg>
            {{ formatDate(task.dueDate) }}
          </span>
          <span
            class="task-badge"
            [class.task-badge--done]="task.isCompleted"
            [class.task-badge--overdue]="isOverdue(task)"
          >
            {{ task.isCompleted ? 'Completed' : isOverdue(task) ? 'Overdue' : 'Pending' }}
          </span>
        </div>
      </div>

      <!-- Actions -->
      <div class="task-actions">
        <button class="action-btn action-btn--edit" (click)="edit(task)" title="Edit">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7" />
            <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z" />
          </svg>
        </button>
        <button class="action-btn action-btn--delete" (click)="delete(task.id)" title="Delete">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <polyline points="3 6 5 6 21 6" />
            <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6" />
            <path d="M10 11v6M14 11v6" />
            <path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2" />
          </svg>
        </button>
      </div>
    </div>
  </div>
</section>
